<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Quiénes — Graph Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .search-options {
            padding: 4px 14px 10px;
            border-bottom: 1px solid #2a2a3a;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 8px;
            user-select: none;
        }

        .toggle-label {
            font-size: 11px;
            color: #8a8aa0;
            font-weight: 500;
        }

        .result-count {
            font-size: 10px;
            color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            padding: 1px 4px;
            border-radius: 4px;
            margin-left: 4px;
            font-weight: 400;
        }

        .result-item:hover .result-count {
            background: rgba(139, 92, 246, 0.2);
        }

        #consolidateToggle {
            cursor: pointer;
            border-radius: 3px;
            border: 1px solid #3a3a4a;
            background: #1a1a2a;
        }
    </style>
</head>

<body>
    <!-- Left Panel: Search + Detail -->
    <aside class="left-panel">
        <div class="panel-header">
            <div class="logo">De Quiénes</div>
            <div class="logo-sub">Graph Explorer</div>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" id="searchInput" placeholder="Nombre o RUT..." autocomplete="off">
            </div>
            <div class="search-options">
                <label class="toggle-container">
                    <input type="checkbox" id="consolidateToggle" checked>
                    <span class="toggle-label">Consolidar nombres idénticos</span>
                </label>
            </div>
            <div id="searchResults" class="search-results hidden"></div>
        </div>

        <!-- Detail Content (shown when node is clicked) -->
        <div id="detailSection" class="detail-section hidden">
            <div id="detailContent"></div>
        </div>

        <!-- Instructions (shown when no node is selected) -->
        <div id="instructions" class="instructions">
            <div class="instruction-item">🔍 Busca por nombre o RUT</div>
            <div class="instruction-item">👆 Click en un nodo para ver detalles</div>
            <div class="instruction-item">👆👆 Doble-click para expandir conexiones</div>
            <div class="instruction-item">🖱️ Arrastra nodos libremente</div>
        </div>
    </aside>

    <!-- Right: Graph Area -->
    <main class="graph-area">
        <div id="graphContainer"></div>
        <div id="graphPlaceholder" class="graph-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64"
                opacity="0.3">
                <circle cx="12" cy="5" r="3" />
                <circle cx="5" cy="19" r="3" />
                <circle cx="19" cy="19" r="3" />
                <path d="M12 8v3M7.5 17.5 10 14M16.5 17.5 14 14" />
            </svg>
            <p>Busca una persona o empresa para visualizar sus conexiones</p>
        </div>
    </main>

    <!-- Loading overlay -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Cargando grafo...</span>
    </div>

    <!-- Stats bar -->
    <div id="statsBar" class="stats-bar hidden">
        <span id="statsText"></span>
    </div>

    <script src="/static/app.js?v=3"></script>
</body>

</html>
